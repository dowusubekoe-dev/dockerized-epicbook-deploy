server {
    listen 80;

    # Route 1: Backend API
    location /api {
        proxy_pass http://backend:5000; # "backend" is the service name in Compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Route 2: Frontend UI
    location / {
        proxy_pass http://frontend:80; # "frontend" is the service name in Compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}