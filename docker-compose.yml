services:
  app:
    build: ./app
    container_name: epicbook-app
    restart: always
    env_file: .env
    networks:
      - frontend-nw
      - backend-nw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 3

    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: epicbook-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: bookstore
    volumes:
      - db_data:/var/lib/mysql
      # Auto-seeds the DB from your manual guide's SQL scripts
      - ./app/db:/docker-entrypoint-initdb.d:ro
    networks:
      - backend-nw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5


  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./proxy/logs:/var/log/nginx
    networks:
      - frontend-nw
    depends_on:
      app:
        condition: service_healthy

networks:
  frontend-nw:
    driver: bridge
  backend-nw:
    driver: bridge

volumes:
  db_data: