
services:

  # ── MySQL Database ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      # Seed files run automatically on first boot (volume empty)
      - ./db/BuyTheBook_Schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/author_seed.sql:/docker-entrypoint-initdb.d/02-author.sql:ro
      - ./db/books_seed.sql:/docker-entrypoint-initdb.d/03-books.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Port 3306 intentionally NOT published — private only

  # ── Node.js Application ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 65s
    # Port 3000 intentionally NOT published — nginx proxies it

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  proxy:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx   # bind-mount → readable on host
    networks:
      - frontend
    depends_on:
      - app

networks:
  frontend:   # proxy ↔ app
  backend:    # app ↔ db  (db never touches the frontend network)

volumes:
  db_data:    # MySQL data persists across restarts